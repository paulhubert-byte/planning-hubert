<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Planning HUBERT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════ BASE ══════════════════ */
:root{
  --bg:#f0f4f8;--surf:#ffffff;--surf2:#f5f7fa;--bord:#dde3ed;--bord2:#b8c4d8;
  --acc:#4f74e3;--text:#1e2640;--dim:#7080a0;
  --sh:0 2px 10px rgba(0,0,0,.09);
  --CW:96px; /* largeur 1 demi-journée */
  --CH:28px; /* hauteur 1 ligne chantier */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Couleurs salariés ── */
.c0{--c:#3b82f6}.c1{--c:#10b981}.c2{--c:#06b6d4}.c3{--c:#8b5cf6}
.c4{--c:#f59e0b}.c5{--c:#ef4444}.c6{--c:#ec4899}.c7{--c:#14b8a6}
.c8{--c:#f97316}.c9{--c:#6366f1}
/* ── Couleurs sous-traitants & temporaires ── */
.cs0{--c:#f59e0b}.cs1{--c:#f97316}.cs2{--c:#ef4444}.cs3{--c:#eab308}
/* ── Stagiaires/intérimaires ── */
.ct0{--c:#a78bfa}.ct1{--c:#f472b6}.ct2{--c:#2dd4bf}

/* ══════════════════ HEADER ══════════════════ */
header{display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;background:var(--surf);border-bottom:1px solid var(--bord);
  box-shadow:0 1px 4px rgba(79,116,227,.10);z-index:50;flex-shrink:0;gap:8px;height:50px}
.wnav{display:flex;align-items:center;gap:5px}
.wnav button,.ibtn{background:var(--surf2);border:1px solid var(--bord);color:var(--text);
  border-radius:7px;cursor:pointer;transition:background .15s;font-family:inherit}
.wnav button{width:28px;height:28px;font-size:14px;display:flex;align-items:center;justify-content:center}
.wnav button:hover,.ibtn:hover{background:var(--bord)}
.wlbl{font-size:12px;font-weight:600;min-width:115px;text-align:center}
.ibtn{padding:5px 10px;font-size:11px;font-weight:600}
.ibtn.acc{background:var(--acc);color:#fff;border-color:var(--acc)}
.ibtn.acc:hover{opacity:.88}

/* ══════════════════ LAYOUT ══════════════════ */
.app{display:flex;height:calc(100vh - 50px);overflow:hidden}

/* ══════════════════ SIDEBAR ══════════════════ */
.sidebar{width:205px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bord);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s}
.sidebar.off{width:0;border:none}
.stabs{display:flex;border-bottom:1px solid var(--bord);flex-shrink:0;background:var(--surf2)}
.stab{flex:1;padding:7px 2px;text-align:center;font-size:10px;font-weight:700;color:var(--dim);
  text-transform:uppercase;letter-spacing:.5px;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap}
.stab.on{color:var(--acc);border-bottom-color:var(--acc);background:var(--surf)}
.shead{padding:7px 9px;border-bottom:1px solid var(--bord);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0}
.shead span{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.sadd{background:var(--acc);color:#fff;border:none;border-radius:5px;
  width:20px;height:20px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.slist{flex:1;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:3px}
.slist::-webkit-scrollbar{width:3px}
.slist::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:2px}
.ci{background:#fff;border:1px solid var(--bord);border-radius:7px;
  padding:6px 8px;display:flex;align-items:center;justify-content:space-between;gap:5px;
  transition:border-color .15s,box-shadow .15s}
.ci:hover{border-color:var(--acc);box-shadow:0 1px 6px rgba(79,116,227,.15)}
.ci span{font-size:11px;font-weight:500;flex:1;cursor:grab}
.ci .cdel{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;opacity:0}
.ci:hover .cdel{opacity:1}
.ci .cadd{background:none;border:1px solid var(--acc);color:var(--acc);cursor:pointer;
  font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;flex-shrink:0;opacity:0}
.ci:hover .cadd{opacity:1}
.ci .cadd.on{opacity:1;background:var(--acc);color:#fff;border-color:var(--acc)}
.ci.done{opacity:.4}
.ci.done span{text-decoration:line-through}

/* ── Commandes ── */
.ccard{border-radius:7px;padding:7px 8px;border:1px solid var(--bord);background:var(--surf2);display:flex;flex-direction:column;gap:3px}
.ccard.cs{border-color:#d97706;background:#fffbeb}
.ccard.ct{border-color:#16a34a;background:#f0fdf4}
.ccard.cl{border-color:#dc2626;background:#fef2f2}
.cbdg{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;align-self:flex-start;border:1px solid currentColor}
.cbdg.cs{color:#d97706;background:#fef3c7}.cbdg.ct{color:#16a34a;background:#dcfce7}
.cbdg.cl{color:#dc2626;background:#fee2e2}.cbdg.cf{color:#7c3aed;background:#ede9fe}
.cbtns{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.cbtn{font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px;
  border:1px solid var(--bord);background:var(--surf);color:var(--dim);cursor:pointer;font-family:inherit}
.cbtn.act{border-color:#16a34a;color:#16a34a}
.cbtn.del:hover{border-color:#dc2626;color:#dc2626}

/* ══════════════════ TOOLBAR ══════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{display:flex;gap:5px;padding:5px 8px;border-bottom:1px solid var(--bord);
  background:var(--surf);align-items:center;flex-shrink:0;overflow-x:auto}
.tb::-webkit-scrollbar{height:0}

/* ══════════════════ GRILLE ══════════════════
   Architecture tag-proof :
   - table-layout:fixed + <col width=CW> → colonnes toujours CW px
   - td : overflow:hidden, height:var(--CH) → jamais d'élargissement
   - #overlay : div absolu sur .gsWrap, pointer-events:none
   - .tag : position:absolute dans #overlay, largeur = span×CW
   - Scroll → repositionnement via requestAnimationFrame
════════════════════════════════════════════ */
.gsWrap{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.gs{flex:1;overflow:auto;position:relative}
.gs::-webkit-scrollbar{width:5px;height:5px}
.gs::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}

/* Overlay qui reçoit les tags */
#ov{position:absolute;top:0;left:0;width:100%;height:200%;
  pointer-events:none;overflow:visible;z-index:8}

.ptable{border-collapse:collapse;table-layout:fixed;width:100%}
.ptable thead th{background:var(--surf2);border:1px solid var(--bord);
  padding:0;text-align:center;position:sticky;top:0;z-index:20;white-space:nowrap}
.th-day{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  padding:3px 2px 1px;letter-spacing:.3px}
.th-day b{font-size:12px;font-weight:700;color:var(--text);display:block}
.th-hf{font-size:8px;font-weight:700;color:var(--dim);padding:1px 0;
  border-top:1px solid var(--bord);display:grid;grid-template-columns:1fr 1fr}
.th-hf span{padding:1px 0}
.th-hf span:first-child{border-right:1px dashed #dde5f0}
/* today */
.today-th .th-day{background:#fce7f3}
.today-th .th-day,.today-th .th-day b{color:#be185d}

/* ── Cellules de données ── */
.ptable td{
  border-right:1px solid #c8d4e4;border-bottom:1px solid var(--bord);
  padding:0;height:var(--CH);min-height:var(--CH);
  overflow:hidden;
  position:relative;background:var(--surf);cursor:pointer
}
/* Séparation journées : bordure droite bien visible */
.ptable td:not(.am):not(.chtit):not(.vtick-cell):not(.sptit):not(.spacer):not(.ch-hide-cell){
  border-right:2px solid #7090b8;
}
.ptable td.am{border-right:1px dashed #d0daea!important}  /* pointillés Mat/AM discrets */
.ptable td.wk{background:#fff0f0}  /* weekend rouge pastel */
.ptable td.jf{background:#ffe0e0!important}  /* jour férié rouge pastel */
.ptable td.jf.wk{background:#ffcfcf!important}
.ptable td.wks{border-left:2px solid var(--bord2)!important} /* séparateur Sam */
.ptable td.dov{background:#dbeafe!important}
.ptable td.today-col{background:#fdf2f8!important}
.ptable td.today-col.wk{background:#fceef6!important}
.ptable td.chtit{
  background:#2d4a8a;font-size:11px;font-weight:700;
  color:#fff;border-top:2px solid #1e3570;
  padding:3px 8px;white-space:nowrap;cursor:default;
  width:140px;max-width:140px;min-width:80px;
  overflow:hidden;text-overflow:ellipsis;
}
/* Cellule nom dans la ligne slots — même largeur, fond légèrement plus clair */
.ptable td.chtit-sub{
  background:#3a5a9a;
  width:140px;max-width:140px;min-width:80px;
  padding:2px 8px;vertical-align:top;
  font-size:9px;font-weight:600;color:rgba(255,255,255,.75);
  overflow:hidden;cursor:default;line-height:1.3;
  border-bottom:1px solid #2d4a8a;
}
.ptable td.chtit-sub-sp{
  background:var(--surf2);
  width:140px;
  border-bottom:1px solid var(--bord);
}
/* Cellule pastille : colspan=2, 1 par jour */
.ptable td.vtick-cell{
  background:#2d4a8a;border-top:2px solid #1e3570;
  border-left:1px solid #3d5a9a;
  vertical-align:middle;padding:3px 4px;
}
.ptable td.vtick-cell.today-vc{background:#3d2060!important}
/* Pastille vide = blanche, remplie = verte ou rouge */
.vtick{
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid rgba(255,255,255,.4);
  background:#fff;
  cursor:pointer;font-size:10px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;
  color:#1a2550;font-family:inherit;
  transition:background .15s,color .15s;
}
.vtick:hover{background:#e0e8ff}
.vtick.has-v{background:#bbf7d0;border-color:#16a34a;color:#14532d}
.vtick.has-v-x{background:#fecaca;border-color:#dc2626;color:#991b1b}
/* vrow supprimé — visites dans chtit */
.ptable td.sptit{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;padding:4px 9px;cursor:default}
.ptable td.sptit.cfa{background:#92400e;color:#fef3c7}
.ptable td.sptit.cp{background:#374151;color:#f9fafb}
.ptable td.sptit.abs{background:#be123c;color:#fff1f2}
.ptable td.sp-cfa{background:#fffbeb}
.ptable td.sp-cp{background:#f8fafc}
.ptable td.sp-abs{background:#fff1f2}
.ptable td.hcfa{background:repeating-linear-gradient(45deg,#fffbeb,#fffbeb 4px,#fef3c7 4px,#fef3c7 8px)!important}
.ptable td.hcp{background:repeating-linear-gradient(45deg,#f3f4f6,#f3f4f6 4px,#e5e7eb 4px,#e5e7eb 8px)!important}
.ptable td.habs{background:repeating-linear-gradient(45deg,#fff5f5,#fff5f5 4px,#fee2e2 4px,#fee2e2 8px)!important}
.ptable td.spacer{height:6px;background:#e8edf5;border:none;padding:0}
.ptable td.spacer-lg{height:10px;background:#e0e8f4;border-top:2px solid #b8c8e0;border-bottom:none;padding:0}

/* ══════════════════ TAGS ══════════════════
   Les tags sont dans #ov (absolu sur .gsWrap).
   Leur position est calculée en JS depuis getBoundingClientRect.
   → Jamais dans le DOM du tableau → aucun élargissement possible
════════════════════════════════════════════ */
.tag{
  position:absolute;
  display:flex;align-items:center;
  height:calc(var(--CH) - 8px);
  border-radius:5px;
  border:1.5px solid color-mix(in srgb,var(--c,#2563eb) 50%,#fff);
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  font-size:10px;font-weight:600;
  cursor:grab;user-select:none;touch-action:none;
  pointer-events:auto; /* réactivé — parent #ov est pointer-events:none */
  overflow:hidden;
  white-space:nowrap;
  box-sizing:border-box;
  z-index:10;
  /* Même pastel que la wcard du panel équipe */
  background:color-mix(in srgb,var(--c,#3b82f6) 18%,#f5f7fa);
  color:color-mix(in srgb,var(--c,#3b82f6) 85%,#000);
  border-color:color-mix(in srgb,var(--c,#3b82f6) 55%,transparent);
}
.tag:hover{box-shadow:0 3px 10px rgba(0,0,0,.28)}
.tag.st{ /* sous-traitant */
  background:color-mix(in srgb,var(--c,#f59e0b) 18%,#f5f7fa);
  color:color-mix(in srgb,var(--c,#f59e0b) 85%,#000);
  border-color:color-mix(in srgb,var(--c,#f59e0b) 55%,transparent);
  border-style:dashed}
.tag.tmp{ /* temporaire/stagiaire */
  border-style:dotted;opacity:.9}
/* Tags dans lignes CFA/CP/ABS : fond teinté, pas plein */
/* tags CFA/CP/ABS : mêmes couleurs que sur les chantiers */
.tag-body{display:flex;align-items:center;gap:2px;flex:1;overflow:hidden;padding:0 3px 0 5px;min-width:0}
.tag-nm{overflow:hidden;text-overflow:ellipsis;flex:1;pointer-events:none;font-size:10px}
.tag-badge{font-size:8px;font-weight:800;background:rgba(255,255,255,.25);
  border-radius:3px;padding:1px 3px;flex-shrink:0;pointer-events:none}
.tag-x{font-size:10px;opacity:.65;cursor:pointer;flex-shrink:0;padding:2px 4px;border-radius:3px;color:#fff}
.tag-x:hover{opacity:1;background:rgba(0,0,0,.2)}
/* Poignée resize — bande droite du tag */
.tag-rz{
  position:absolute;right:0;top:0;bottom:0;width:7px;
  cursor:ew-resize;flex-shrink:0;
  background:color-mix(in srgb,var(--c,#2563eb) 25%,transparent);
  border-radius:0 4px 4px 0;
  display:flex;align-items:center;justify-content:center
}
.tag-rz::after{content:'⋮';font-size:10px;color:color-mix(in srgb,var(--c,#3b82f6) 80%,#000);pointer-events:none}
.tag.st .tag-rz,.tag.tmp .tag-rz{background:rgba(0,0,0,.1)}
.tag.rzing{box-shadow:0 0 0 2px var(--acc),0 4px 12px rgba(0,0,0,.3)!important;cursor:ew-resize}

/* ══════════════════ PANEL ÉQUIPE ══════════════════ */
.pp{width:152px;flex-shrink:0;background:var(--surf);border-left:1px solid var(--bord);
  display:flex;flex-direction:column;overflow:hidden}
.pp-head{padding:8px 10px;border-bottom:1px solid var(--bord);font-size:10px;font-weight:700;
  color:var(--dim);text-transform:uppercase;letter-spacing:.9px;
  display:flex;align-items:center;justify-content:space-between;background:var(--surf2);flex-shrink:0}
.pp-head .bdg{background:var(--acc);color:#fff;border-radius:9px;padding:1px 7px;font-size:10px;font-weight:700}
.wlist{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
.wlist::-webkit-scrollbar{width:3px}
.wlist::-webkit-scrollbar-thumb{background:var(--bord);border-radius:2px}
.wcard{border-radius:8px;padding:7px 8px;
  background:color-mix(in srgb,var(--c,#2563eb) 15%,var(--surf2));
  border:1.5px solid color-mix(in srgb,var(--c,#2563eb) 50%,transparent);
  cursor:grab;user-select:none;touch-action:none;
  display:flex;align-items:center;gap:5px;transition:box-shadow .15s}
.wcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.wcard.st{border-style:dashed;border-color:color-mix(in srgb,var(--c,#d97706) 45%,transparent)}
.wcard.tmp{border-style:dotted;border-color:color-mix(in srgb,var(--c,#8b5cf6) 45%,transparent)}
.wdot{width:8px;height:8px;border-radius:50%;background:var(--c,#2563eb);flex-shrink:0}
.wdot.st{border-radius:2px;background:linear-gradient(135deg,var(--c,#d97706),color-mix(in srgb,var(--c,#d97706) 60%,#fff))}
.wdot.tmp{border-radius:0;transform:rotate(45deg);background:var(--c,#8b5cf6)}
.wname{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wcnt{font-size:10px;font-weight:700;background:rgba(0,0,0,.07);border-radius:4px;padding:1px 5px;color:var(--dim)}
.wcnt.z{background:#fee2e2;color:#dc2626}
.st-div{font-size:9px;font-weight:800;color:#d97706;text-transform:uppercase;
  letter-spacing:1px;padding:6px 2px 3px;display:flex;align-items:center;gap:5px}
.st-div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#d9770655,transparent)}
.tmp-div{font-size:9px;font-weight:800;color:#8b5cf6;text-transform:uppercase;
  letter-spacing:1px;padding:6px 2px 3px;display:flex;align-items:center;gap:5px}
.tmp-div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#8b5cf655,transparent)}
.wsbadge{font-size:8px;font-weight:800;border-radius:3px;padding:1px 4px;flex-shrink:0}

/* ══════════════════ CONFIG ══════════════════ */
.cfgpan{position:fixed;top:50px;right:0;bottom:0;width:300px;background:var(--surf);
  border-left:1px solid var(--bord);z-index:80;padding:14px;overflow-y:auto;
  transform:translateX(100%);transition:transform .3s;box-shadow:-4px 0 16px rgba(0,0,0,.07)}
.cfgpan.on{transform:translateX(0)}
.cfgpan h4{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:12px}
.cfg-s{margin-bottom:13px}
.cfg-s label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:.7px;display:block;margin-bottom:4px}
.cfg-s input,.cfg-s select{width:100%;background:var(--surf2);border:1px solid var(--bord);
  border-radius:7px;color:var(--text);padding:7px 9px;font-size:12px;font-family:inherit;outline:none}
.cfg-s input:focus{border-color:var(--acc)}
.cfg-s p{font-size:11px;color:var(--dim);line-height:1.5;margin-top:4px}
.cfg-s a{color:var(--acc)}
.cfgbtn{border:none;border-radius:7px;padding:8px;width:100%;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:3px}
.cfgbtn.p{background:var(--acc);color:#fff}
.cfgbtn.s{background:#dbeafe;border:1px solid var(--acc)!important;color:var(--acc)}
.cfgbtn.t{background:#fef3c7;border:1px solid #d97706!important;color:#92400e}
.cfgbtn.tmp{background:#ede9fe;border:1px solid #7c3aed!important;color:#4c1d95}
.cfgbtn.d{background:#fee2e2;border:1px solid #dc2626!important;color:#dc2626}
.cfgsep{border:none;border-top:1px solid var(--bord);margin:12px 0}

/* ══════════════════ MODALS ══════════════════ */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px}
.mover.off{display:none}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:12px;
  padding:18px;width:100%;max-width:430px;box-shadow:0 8px 32px rgba(0,0,0,.14)}
.modal h3{font-family:'Syne',sans-serif;font-size:14px;margin-bottom:12px}
.mf{margin-bottom:8px}
.mf label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:.6px;display:block;margin-bottom:3px}
.mf input,.mf select,.mf textarea{width:100%;background:var(--surf2);border:1px solid var(--bord);
  border-radius:7px;color:var(--text);padding:7px 9px;font-size:13px;font-family:inherit;outline:none}
.mf input:focus,.mf select:focus{border-color:var(--acc)}
.mf textarea{resize:vertical;min-height:50px}
.mrow{display:flex;gap:7px}.mrow>.mf{flex:1}
.mbtns{display:flex;gap:7px;margin-top:8px}
.mbtns button{flex:1;padding:8px;border-radius:7px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit}
.mbtns .ok{background:var(--acc);color:#fff}
.mbtns .no{background:var(--surf2);color:var(--text);border:1px solid var(--bord)!important}
.abtns{display:flex;gap:5px}
.abtn{font-size:11px;font-weight:700;border-radius:5px;padding:4px 9px;
  border:1px solid var(--bord);background:var(--surf);color:var(--dim);
  cursor:pointer;font-family:inherit}
.abtn.cfa.on{background:#78350f;color:#fef3c7;border-color:#78350f}
.abtn.cp.on{background:#1c1c1c;color:#f3f4f6;border-color:#1c1c1c}
.abtn.abs.on{background:#991b1b;color:#fee2e2;border-color:#991b1b}
.abslist{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;margin-top:8px}
.absrow{display:flex;align-items:center;gap:7px;padding:6px 8px;

<script type="module">
// ═══════════════════════════════════════════════════════
// FIREBASE REALTIME DATABASE
// ═══════════════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzAMl9J28UNUb3f7nD5x3ePsejUHeW7BE",
  authDomain: "planning-hubert.firebaseapp.com",
  databaseURL: "https://planning-hubert-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "planning-hubert",
  storageBucket: "planning-hubert.firebasestorage.app",
  messagingSenderId: "114322590139",
  appId: "1:114322590139:web:c801813e40b85bbe301c9e"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const dataRef = ref(db, 'hub6');

// État sync
let _fbReady = false;
let _ignoreNext = false; // évite la boucle locale→firebase→locale

function setSyncDot(state){
  const dot = document.getElementById('sdot');
  const btn = document.getElementById('bSync');
  if(!dot) return;
  if(state === 'ok'){
    dot.style.background = '#16a34a';
    if(btn) btn.title = 'Synchronisé ✓';
  } else if(state === 'sync'){
    dot.style.background = '#f59e0b';
    if(btn) btn.title = 'Synchronisation…';
  } else {
    dot.style.background = '#dc2626';
    if(btn) btn.title = 'Hors ligne';
  }
}

// Écouter les changements Firebase en temps réel
onValue(dataRef, (snapshot) => {
  if(_ignoreNext){ _ignoreNext = false; return; }
  const remote = snapshot.val();
  if(!remote) return;
  // Fusionner les données distantes dans G
  // (ne pas écraser si on vient de sauvegarder)
  if(typeof window._G_merge === 'function') window._G_merge(remote);
  setSyncDot('ok');
  _fbReady = true;
}, (error) => {
  setSyncDot('err');
  console.warn('Firebase:', error);
});

// Exposer la fonction push pour le code principal
window._fbPush = function(data){
  setSyncDot('sync');
  _ignoreNext = true;
  set(dataRef, data)
    .then(() => setSyncDot('ok'))
    .catch(e => { setSyncDot('err'); console.warn(e); _ignoreNext = false; });
};

window._fbReady = () => _fbReady;
</script>

<script>

// Jours fériés français — calculés dynamiquement
function joursFeries(year){
  // Pâques (algorithme de Meeus/Jones/Butcher)
  const a=year%19,b=Math.floor(year/100),d=b-Math.floor(b/4);
  const e=Math.floor((b-Math.floor((b+8)/25)+1)/3);
  const f=Math.floor((19*a+b-d-e+15)/30);
  const g=year%4,h=year%7;
  const i=Math.floor((32+2*(b%4)+2*g-f-h%29)/7);
  const paques=new Date(year,2,f+i-7*Math.floor((a+11*f+22*i)/451)+22);
  const lp=new Date(paques);lp.setDate(paques.getDate()+1);  // lundi Pâques
  const as=new Date(paques);as.setDate(paques.getDate()+39); // Ascension
  const pent=new Date(paques);pent.setDate(paques.getDate()+50); // Lundi Pentecôte
  const feries=[
    new Date(year,0,1),   // 1er jan
    lp,                    // lundi Pâques
    new Date(year,4,1),   // 1er mai
    new Date(year,4,8),   // 8 mai
    as,                    // Ascension
    pent,                  // Pentecôte
    new Date(year,6,14),  // 14 juillet
    new Date(year,7,15),  // 15 août
    new Date(year,10,1),  // Toussaint
    new Date(year,10,11), // 11 novembre
    new Date(year,11,25), // Noël
  ];
  return feries.map(d=>d.toDateString());
}

const sDay=s=>Math.floor(s/2);

// ═══════════════════════════════════════════════════════
// HELPERS SEMAINE
// ═══════════════════════════════════════════════════════
function wkDates(off){
  const n=new Date(),d=n.getDay()||7,m=new Date(n);
  m.setDate(n.getDate()-d+1+off*7);
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function isoW(d){
  const j=new Date(d.getFullYear(),0,4),w=new Date(j);
  w.setDate(j.getDate()-((j.getDay()||7)-1));
  return Math.ceil(((d-w)/86400000+1)/7);
}
function wkey(off=G.off){const d=wkDates(off)[0];return d.getFullYear()+'-W'+isoW(d);}
function fD(d){return d.getDate()+'/'+(d.getMonth()+1);}
function isToday(d){return d.toDateString()===new Date().toDateString();}
function isoDate(d){return d.toISOString().split('T')[0];}

function blks(ch,wk2=wkey()){
  if(!G.planning[wk2])G.planning[wk2]={};
  if(!G.planning[wk2][ch])G.planning[wk2][ch]=[];
  return G.planning[wk2][ch];
}
function setBlks(ch,arr,wk2=wkey()){if(!G.planning[wk2])G.planning[wk2]={};G.planning[wk2][ch]=arr;}
function getV(ch,d){return((G.visits[wkey()]||{})[ch]||{})[d]||'';}
function setV(ch,d,v){if(!G.visits[wkey()])G.visits[wkey()]={};if(!G.visits[wkey()][ch])G.visits[wkey()][ch]={};G.visits[wkey()][ch][d]=v;}

// Statut d'un ouvrier à une date JS
function statut(wn,date){
  if(!G.absences)return'';
  const d=new Date(date);d.setHours(12,0,0,0);
  const a=G.absences.find(x=>x.n===wn&&new Date(x.deb+'T12:00:00')<=d&&new Date(x.fin+'T12:00:00')>=d);
  return a?a.type:'';
}

// Ouvrier visible cette semaine (temporaires filtrés par date)
function workerVisibleThisWeek(w){
  if(w.t!=='tmp')return true;
  const dd=wkDates(G.off);
  const wStart=new Date(dd[0]);wStart.setHours(0,0,0,0);
  const wEnd=new Date(dd[6]);wEnd.setHours(23,59,59,999);
  if(!w.deb||!w.fin)return true;
  const wDeb=new Date(w.deb+'T00:00:00'),wFin=new Date(w.fin+'T23:59:59');
  return wDeb<=wEnd&&wFin>=wStart;
}

function hideChThisWeek(ch){
  if(!G.hiddenChantiers)G.hiddenChantiers={};
if(!G.chantiersDone)G.chantiersDone=[];
  const k=wkey();
  if(!G.hiddenChantiers[k])G.hiddenChantiers[k]=[];
  if(!G.hiddenChantiers[k].includes(ch))G.hiddenChantiers[k].push(ch);
  save();render();
}
function isChHiddenThisWeek(ch){
  // Masqué explicitement cette semaine
  if(((G.hiddenChantiers||{})[wkey()]||[]).includes(ch))return true;
  // Terminé → visible seulement si a des blocs planifiés cette semaine
  if((G.chantiersDone||[]).includes(ch)){
    return blks(ch).length===0;
  }
  return false;
}

function addBlk(ch,worker,start,span=1){
  pushHist();
  const SPMAP={_cfa:'cfa',_cp:'cp',_abs:'abs'};
  if(SPMAP[ch]){
    const type=SPMAP[ch];
    const di=sDay(start);
    const iso=isoDate(wkDates(G.off)[di]);
    if(!G.absences)G.absences=[];
    // Bloquer si même salarié déjà absent ce jour pour ce type
    const bl=blks(ch);
    if(bl.some(b=>b.w===worker&&b.s<start+2&&b.s+b.sp>start))return false;
    // Créer le bloc planning (span=2 pour couvrir matin+AM du jour)
    const bid='b'+Date.now()+Math.random().toString(36).slice(2,4);
    // On crée à start avec span=1 (la demi-journée déposée)
    bl.push({id:bid,w:worker,s:start,sp:1});
    setBlks(ch,bl);
    // Créer aussi l'entrée absences si pas déjà là
    if(!G.absences.find(a=>a.n===worker&&a.type===type&&a.deb<=iso&&a.fin>=iso))
      G.absences.push({id:'a'+Date.now(),n:worker,type,deb:iso,fin:iso});
    save();return true;
  }
  const bl=blks(ch);
  if(bl.some(b=>b.w===worker&&b.s<start+span&&b.s+b.sp>start))return false;
  bl.push({id:'b'+Date.now()+Math.random().toString(36).slice(2,4),w:worker,s:start,sp:span});
  setBlks(ch,bl);save();return true;
}
function rmBlk(ch,id){
  pushHist();
  const SPMAP={_cfa:'cfa',_cp:'cp',_abs:'abs'};
  if(SPMAP[ch]){
    // Trouver le bloc pour connaître le worker et le slot
    const b=blks(ch).find(x=>x.id===id);
    if(b){
      const iso=isoDate(wkDates(G.off)[sDay(b.s)]);
      // Supprimer l'absence du jour pour ce worker
      G.absences=G.absences.filter(a=>!(a.n===b.w&&a.type===SPMAP[ch]&&a.deb<=iso&&a.fin>=iso)||
        !(a.deb===iso&&a.fin===iso)
      );
      // Si la plage est plus large, la splitter
      const aa=G.absences.find(a=>a.n===b.w&&a.type===SPMAP[ch]&&a.deb<=iso&&a.fin>=iso);
      if(aa){
        if(aa.deb===iso)aa.deb=nxtDay(iso);
        else if(aa.fin===iso)aa.fin=prvDay(iso);
        else{const f1=prvDay(iso);const a2={id:'a'+Date.now(),n:aa.n,type:aa.type,deb:nxtDay(iso),fin:aa.fin};aa.fin=f1;G.absences.push(a2);}
      }
    }
    setBlks(ch,blks(ch).filter(b=>b.id!==id));save();return;
  }
  setBlks(ch,blks(ch).filter(b=>b.id!==id));save();
}
function updBlk(ch,id,ns,nsp){
  pushHist();
  const bl=blks(ch),b=bl.find(x=>x.id===id);if(!b)return;
  ns=Math.max(0,Math.min(ns,SLOTS-1));nsp=Math.max(1,Math.min(nsp,SLOTS-ns));
  if(bl.some(x=>x.id!==id&&x.w===b.w&&x.s<ns+nsp&&x.s+x.sp>ns))return;
  b.s=ns;b.sp=nsp;save();
}
function getCSSColor(cls){
  const m={'c0':'#2563eb','c1':'#059669','c2':'#0891b2','c3':'#7c3aed','c4':'#0d9488',
    'c5':'#1d4ed8','c6':'#6d28d9','c7':'#0e7490','c8':'#b45309','c9':'#15803d',
    'cs0':'#d97706','cs1':'#ea580c','cs2':'#dc2626','cs3':'#ca8a04',
    'ct0':'#8b5cf6','ct1':'#ec4899','ct2':'#14b8a6'};
  return m[cls]||'#2563eb';
}
function wCol(n){return(G.workers.find(w=>w.n===n)||{}).col||'c0';}
function wType(n){return(G.workers.find(w=>w.n===n)||{}).t||'w';}

function syncAbsencesToBlks(){
  // Synchronise G.absences → blocs planning pour la semaine affichée
  // Recrée les blocs _cfa/_cp/_abs depuis les plages G.absences
  if(!G.absences||!G.absences.length)return;
  const SPMAP={cfa:'_cfa',cp:'_cp',abs:'_abs'};
  const wk2=wkey();
  const dd=wkDates(G.off);
  // Réinitialiser les 3 lignes spéciales pour cette semaine
  if(!G.planning[wk2])G.planning[wk2]={};
  G.planning[wk2]['_cfa']=[];
  G.planning[wk2]['_cp']=[];
  G.planning[wk2]['_abs']=[];
  // Reconstruire depuis G.absences
  G.absences.forEach(a=>{
    const ch=SPMAP[a.type];if(!ch)return;
    const d0=new Date(a.deb+'T12:00:00'),d1=new Date(a.fin+'T12:00:00');
    dd.forEach((date,di)=>{
      const dj=new Date(date);dj.setHours(12,0,0,0);
      if(dj<d0||dj>d1)return;
      const slotM=di*2; // slot Matin
      const bl=G.planning[wk2][ch];
      // Ajouter si pas déjà là pour ce worker ce jour
      if(!bl.some(b=>b.w===a.n&&b.s===slotM))
        bl.push({id:'abs_'+a.id+'_'+di,w:a.n,s:slotM,sp:2});
    });
  });
}

function render(){
  rCW();
  syncAbsencesToBlks(); // sync avant rendu
  renderHead();renderSide();renderGrid();renderWPanel();renderCmds();
  requestAnimationFrame(()=>requestAnimationFrame(placeAllTags));
}

  // Colonne nom : largeur fixe
  const colNom=document.createElement('col');colNom.style.width='140px';cg.appendChild(colNom);

  for(let i=0;i<SLOTS;i++){const col=document.createElement('col');col.style.width=CW+'px';cg.appendChild(col);}
  // Colonne bouton masquer
  const colBtn=document.createElement('col');colBtn.style.width='22px';cg.appendChild(colBtn);
  // thead : 2 lignes
  const th=document.getElementById('phead');th.innerHTML='';
  const r1=document.createElement('tr');
  // Cellule vide pour la colonne nom dans le header
  const thNom1=document.createElement('th');thNom1.style.background='var(--surf2)';
  r1.appendChild(thNom1);
  dd.forEach((d,i)=>{
    const t=document.createElement('th');t.colSpan=2;

    const _isJF=joursFeries(d.getFullYear()).includes(d.toDateString());

    t.innerHTML=`<div class="th-day"><b>${JOURS[i]}${jfLabel}</b>${fD(d)}</div>`;
    r1.appendChild(t);
  });
  th.appendChild(r1);
  const r2=document.createElement('tr');
  const thNom2=document.createElement('th');thNom2.style.background='var(--surf2)';
  r2.appendChild(thNom2);
  dd.forEach((d,i)=>{
    const t=document.createElement('th');t.colSpan=2;
    if(i===5)t.style.borderLeft='2px solid var(--bord2)';
    t.innerHTML=`<div class="th-hf"><span>Mat.</span><span>A-M</span></div>`;
    r2.appendChild(t);
  });
  th.appendChild(r2);
}

function renderSide(){
  const l=document.getElementById('listC');l.innerHTML='';
  const done=G.chantiersDone||[];
  const actifs=G.chantiers.filter(ch=>!done.includes(ch));
  const termines=G.chantiers.filter(ch=>done.includes(ch));

  // ── Chantiers actifs : nom + ✕ pour marquer terminé ──
  actifs.forEach(ch=>{
    const d=document.createElement('div');d.className='ci';
    const sp=document.createElement('span');sp.textContent=ch;sp.style.flex='1';
    d.appendChild(sp);
    const del=document.createElement('button');del.className='cdel';del.textContent='✕';
    del.title="Marquer comme terminé";
    del.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm(`Marquer "${ch}" comme terminé ?
Il reste visible sur les semaines déjà planifiées.`)){
        if(!G.chantiersDone)G.chantiersDone=[];
        G.chantiersDone.push(ch);
        save();render();
      }
    });
    d.appendChild(del);
    setupCIDrag(d,ch);
    l.appendChild(d);
  });

  // ── Séparateur + chantiers terminés ──────────────
  if(termines.length){
    const sep=document.createElement('div');
    sep.style.cssText='font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;padding:8px 4px 3px;display:flex;align-items:center;gap:5px';
    sep.innerHTML='Terminés <span style="flex:1;height:1px;background:var(--bord);display:inline-block;vertical-align:middle"></span>';
    l.appendChild(sep);
    termines.forEach(ch=>{
      const d=document.createElement('div');d.className='ci done';
      const sp=document.createElement('span');sp.textContent=ch;sp.style.flex='1';
      d.appendChild(sp);
      // Réactiver
      const btn=document.createElement('button');
      btn.style.cssText='background:none;border:1px solid var(--acc);color:var(--acc);cursor:pointer;font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;flex-shrink:0;opacity:0;font-family:inherit';
      btn.textContent='↩ Réactiver';
      d.addEventListener('mouseenter',()=>btn.style.opacity='1');
      d.addEventListener('mouseleave',()=>btn.style.opacity='0');
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        G.chantiersDone=(G.chantiersDone||[]).filter(x=>x!==ch);
        save();render();
      });
      d.appendChild(btn);
      l.appendChild(d);
    });
  }
}

function renderWPanel(){
  const l=document.getElementById('wlist');l.innerHTML='';
  const cnt={};G.workers.forEach(w=>cnt[w.n]=0);
  [...G.chantiers,'_cfa','_cp','_abs'].forEach(c=>blks(c).forEach(b=>{if(cnt[b.w]!==undefined)cnt[b.w]+=b.sp;}));
  const sal=G.workers.filter(w=>w.t==='w');
  const sts=G.workers.filter(w=>w.t==='s');
  const tmps=G.workers.filter(w=>w.t==='tmp'&&workerVisibleThisWeek(w));
  sal.forEach(w=>l.appendChild(mkWCard(w,cnt[w.n]||0)));
  if(sts.length){
    const dv=document.createElement('div');dv.className='st-div';dv.textContent='S/traitants';l.appendChild(dv);
    sts.forEach(w=>l.appendChild(mkWCard(w,cnt[w.n]||0)));
  }
  if(tmps.length){
    const dv=document.createElement('div');dv.className='tmp-div';dv.textContent='Intérim/Stag.';l.appendChild(dv);
    tmps.forEach(w=>l.appendChild(mkWCard(w,cnt[w.n]||0)));
  }
  const total=sal.length+sts.length+tmps.length;
  document.getElementById('wbadge').textContent=total;
  // Select suppression
  const sel=document.getElementById('cgDelW');
  if(sel){sel.innerHTML='';G.workers.forEach(w=>{
    const o=document.createElement('option');o.value=w.n;
    o.textContent=`${w.n} (${w.t==='s'?'S/T':w.t==='tmp'?'Intér.':'Sal.'})`;sel.appendChild(o);});}
}
function mkWCard(w,cnt){
  const c=document.createElement('div');
  c.className=`wcard ${w.col}${w.t==='s'?' st':w.t==='tmp'?' tmp':''}`;
  c.dataset.w=w.n;
  const dot=document.createElement('div');dot.className=`wdot${w.t==='s'?' st':w.t==='tmp'?' tmp':''}`;
  c.appendChild(dot);
  const dd=wkDates(G.off);let st='';
  for(const d of dd){st=statut(w.n,d);if(st)break;}
  const stH=st?`<span class="wsbadge" style="background:${st==='cfa'?'#78350f':st==='cp'?'#1c1c1c':'#991b1b'};
    color:${st==='cfa'?'#fef3c7':st==='cp'?'#f3f4f6':'#fee2e2'}">${st.toUpperCase()}</span>`:'';
  const tmpH=w.t==='tmp'&&w.fin?`<span style="font-size:8px;color:var(--dim)">→${w.fin.slice(5).replace('-','/')}</span>`:'';
  c.innerHTML+=`<span class="wname">${w.n}</span>
    <span class="wcnt ${cnt===0?'z':''}">${cnt}</span>${stH}${tmpH}`;
  setupPDrag(c,w.n,w.col);
  return c;
}

function renderGrid(){
  const tb=document.getElementById('pbody');tb.innerHTML='';
  const dd=wkDates(G.off);
  const ws=new Date(dd[0]);ws.setHours(0,0,0,0);
  const we=new Date(dd[6]);we.setHours(23,59,59,999);
  // Banners pipeline
  G.commandes.forEach(cmd=>{
    if(cmd.st!=='pipeline'||!cmd.deb)return;
    const ds=new Date(cmd.deb+'T12:00:00');
    if(ds>=ws&&ds<=we&&!G.chantiers.includes(cmd.nom)){
      const tr=document.createElement('tr');
      const td=document.createElement('td');td.colSpan=SLOTS;
      td.innerHTML=`<div class="pbanner">🚀 <strong>${cmd.nom}</strong> — prévu le ${ds.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}
        <button onclick="actCmd('${cmd.id}')">➕ Activer</button></div>`;
      tr.appendChild(td);tb.appendChild(tr);
    }
  });
  G.chantiers.filter(ch=>!isChHiddenThisWeek(ch)).forEach(ch=>addChRows(tb,ch,dd,false));
  // Séparateur large avant les lignes spéciales
  const trSepSp=document.createElement('tr');
  const tdSepSp=document.createElement('td');tdSepSp.colSpan=SLOTS+1;tdSepSp.className='spacer-lg';
  trSepSp.appendChild(tdSepSp);tb.appendChild(trSepSp);
  [['_cfa','cfa','CFA'],['_cp','cp','Congés'],['_abs','abs','Absences']]
    .forEach(([ch,t,lbl])=>addChRows(tb,ch,dd,true,t,lbl));
}

function addChRows(tb,ch,dd,isSp,absType='',spLbl=''){
  // Ligne titre : pour les chantiers normaux = td nom + 7 td(colspan=2) pastilles
  // Pour les lignes spéciales = td colspan=SLOTS
  const trT=document.createElement('tr');
  if(isSp){
    const tdT=document.createElement('td');tdT.colSpan=SLOTS+1;
    tdT.className=`sptit ${absType}`;tdT.textContent=spLbl;
    trT.appendChild(tdT);
  } else {
    // td nom — PAS de colspan, largeur naturelle du texte
    const tdN=document.createElement('td');
    tdN.className='chtit';
    tdN.textContent=ch;
    trT.appendChild(tdN);
    // 7 td(colspan=2) pastilles — une par jour, alignées sur les colonnes
    dd.forEach((date,di)=>{
      const tdV=document.createElement('td');
      tdV.colSpan=2;
      tdV.className='vtick-cell'+(isToday(date)?' today-vc':'');
      if(di===5)tdV.style.borderLeft='2px solid #8899c8';
      const v=getV(ch,di);
      const tk=document.createElement('button');
      const isX=v==='X';
      tk.className='vtick'+(v?(isX?' has-v-x':' has-v'):'');
      tk.textContent=v||'';
      tk.addEventListener('click',e=>{
        e.stopPropagation();
        const cur=getV(ch,di);
        if(cur){ setV(ch,di,'');tk.textContent='';tk.className='vtick';save();return; }
        captureOneLetter(tk,ch,di);
      });
      tdV.appendChild(tk);
      trT.appendChild(tdV);
    });
    // Bouton ✕ masquer ce chantier cette semaine (après dim AM)
    const tdHide=document.createElement('td');
    tdHide.className='ch-hide-cell';
    const btnHide=document.createElement('button');
    btnHide.className='ch-hide-btn';btnHide.textContent='✕';
    btnHide.title='Masquer ce chantier cette semaine';
    btnHide.addEventListener('click',e=>{e.stopPropagation();hideChThisWeek(ch);});
    tdHide.appendChild(btnHide);
    trT.appendChild(tdHide);
  }
  tb.appendChild(trT);
  // Slots — cellules vides (les tags sont dans #ov)
  const trS=document.createElement('tr');
  // Cellule nom dans la ligne slots (pas de data-ch = pas de dépôt possible)
  if(!isSp){
    const tdNomS=document.createElement('td');
    tdNomS.className='chtit-sub';
    // Afficher le nom sur 2 lignes si > 16 caractères
    if(ch.length>16){
      const words=ch.split(/[\s\-–]/);
      let line1='',line2='';
      for(const w of words){
        if((line1+' '+w).trim().length<=16)line1=(line1+' '+w).trim();
        else{line2=(line2+' '+w).trim();}
      }
      tdNomS.innerHTML=`<span>${line1}</span>${line2?`<br><span style="opacity:.8">${line2}</span>`:''}`;
    }
    trS.appendChild(tdNomS);
  } else {
    const tdNomS=document.createElement('td');
    tdNomS.className='chtit-sub-sp';
    trS.appendChild(tdNomS);
  }
  for(let di=0;di<7;di++){
    const date=dd[di];
    for(let hi=0;hi<2;hi++){
      const half=DEMI[hi];const slotI=sid(di,half);
      const td=document.createElement('td');
      let cls=hi===0?'am':'';
      if(di>=5)cls+=' wk';
      if(di===5&&hi===0)cls+=' wks';
      if(isSp)cls+=` sp-${absType}`;
      td.className=cls.trim();
      td.dataset.ch=ch;td.dataset.s=slotI;td.dataset.d=di;td.dataset.h=half;
      if(isToday(date))td.classList.add('today-col');
      // Jour férié
      const _feries=joursFeries(date.getFullYear());
      if(_feries.includes(date.toDateString()))td.classList.add('jf');
      // Hachure si ouvrier planifié ici est absent ce jour
      if(!isSp){
        blks(ch).filter(b=>b.s<=slotI&&b.s+b.sp>slotI).forEach(b=>{
          const st2=statut(b.w,date);
          if(st2)td.classList.add('h'+st2);
        });
      }
      td.addEventListener('click',e=>{if(e.target===td)onCellClick(ch,slotI,date,isSp,absType);});
      trS.appendChild(td);
    }
  }
  tb.appendChild(trS);
  // Ligne vrow supprimée — visites dans chtit pastilles
  // Spacer
  const trSp=document.createElement('tr');
  const tdSp=document.createElement('td');tdSp.colSpan=SLOTS+1;tdSp.className='spacer';
  trSp.appendChild(tdSp);tb.appendChild(trSp);
}

// Capture 1 lettre au clavier pour une pastille
function captureOneLetter(tk,ch,di){
  // Créer un input invisible positionné sur la pastille
  const inp=document.createElement('input');
  inp.style.cssText='position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;';
  tk.style.position='relative';
  tk.appendChild(inp);
  inp.focus();
  inp.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Escape'){inp.remove();return;}
    const l=e.key.length===1?e.key.toUpperCase():'';
    if(!l){inp.remove();return;}
    setV(ch,di,l);
    tk.textContent=l;
    tk.className='vtick'+(l==='X'?' has-v-x':' has-v');
    save();
    inp.remove();
  });
  inp.addEventListener('blur',()=>inp.remove());
}
function onCellClick(ch,slotI,date,isSp,absType){}

// OVERLAY TAGS
// Les tags sont positionnés dans #ov (absolu sur .gsWrap)
// en utilisant getBoundingClientRect pour calculer leur position.
// Cela garantit que les colonnes du tableau ne sont JAMAIS élargies.
// ═══════════════════════════════════════════════════════
function placeAllTags(){
  const ov=document.getElementById('ov');
  const gs=document.getElementById('gs');
  if(!ov||!gs)return;
  ov.innerHTML='';
  rCW();
  const TAG_H=CH-4;  /* 24px avec CH=28 */
  const TAG_GAP=2;

  // ── Compte le nb de tags qui COUVRENT un slot donné
  // (démarrent ici OU s'étendent jusqu'ici)
  function countAtSlot(ch,slotI){
    return blks(ch).filter(b=>b.s<=slotI&&b.s+b.sp>slotI).length;
  }
  function countAbsAtDay(absType,di){
    if(!G.absences)return 0;
    const date=wkDates(G.off)[di];
    const dj=new Date(date);dj.setHours(12,0,0,0);
    return G.absences.filter(a=>{
      if(a.type!==absType)return false;
      return new Date(a.deb+'T12:00:00')<=dj&&new Date(a.fin+'T12:00:00')>=dj;
    }).length;
  }

  // ── ÉTAPE 1 : ajuster les hauteurs des lignes
  //    On calcule le max de tags simultanés sur n'importe quel slot du chantier
  function setRowH(ch,isSp,absType){
    let max=0;
    for(let di=0;di<7;di++){
      for(let hi=0;hi<2;hi++){
        const slotI=sid(di,DEMI[hi]);
        const n=countAtSlot(ch,slotI);  // même logique pour sp et normal
        if(n>max)max=n;
      }
    }
    const h=max<=0 ? CH : TAG_GAP+max*(TAG_H+TAG_GAP);
    document.querySelectorAll(`.ptable td[data-ch="${CSS.escape(ch)}"]`).forEach(td=>{
      td.style.height=Math.max(h,CH)+'px';
    });
  }

  G.chantiers.forEach(ch=>setRowH(ch,false,''));
  [['_cfa','cfa'],['_cp','cp'],['_abs','abs']].forEach(([ch,t])=>setRowH(ch,true,t));

  // ── ÉTAPE 2 : attendre un repaint PUIS placer les tags
  requestAnimationFrame(()=>{
    // Position stable au scroll :
    // left = rect.left - gsRect.left + gs.scrollLeft
    // top  = rect.top  - gsRect.top  + gs.scrollTop
    // Ces coordonnées sont dans l'espace du contenu scrollable de #gs
    // → cohérentes avec position:absolute dans #ov (qui est dans #gs)
    const gsR=gs.getBoundingClientRect();
    const dd=wkDates(G.off);

    function placeCh(ch,isSp,absType){
      for(let di=0;di<7;di++){
        const date=dd[di];
        for(let hi=0;hi<2;hi++){
          const half=DEMI[hi],slotI=sid(di,half);
          const cell=document.querySelector(
            `.ptable td[data-ch="${CSS.escape(ch)}"][data-s="${slotI}"]`);
          if(!cell)continue;
          const cR=cell.getBoundingClientRect();
          // Coordonnées dans l'espace scrollable (stables au scroll)
          const left=cR.left-gsR.left+gs.scrollLeft;
          const top=cR.top-gsR.top+gs.scrollTop;

          if(isSp){
            // Lignes spéciales : même logique que chantiers (tags depuis blks)
            const allAtSlotSp=blks(ch).filter(b=>b.s<=slotI&&b.s+b.sp>slotI);
            blks(ch).filter(b=>b.s===slotI).forEach(b=>{
              const slotIdx=allAtSlotSp.indexOf(b);
              const tag=mkTag(b.w,b.id,ch,b.id,wCol(b.w),wType(b.w),false,b.sp,di);
              tag.style.left=(left+2)+'px';
              tag.style.top=(top+TAG_GAP+slotIdx*(TAG_H+TAG_GAP))+'px';
              tag.style.width=(b.sp*CW-6)+'px';
              tag.style.height=TAG_H+'px';
              ov.appendChild(tag);
            });
          } else {
            // Tags chantier : seulement ceux qui DÉMARRENT à ce slot
            // La position verticale = nb de blocs qui couvrent ce slot ET qui ont été ajoutés avant
            const allAtSlot=blks(ch).filter(b=>b.s<=slotI&&b.s+b.sp>slotI);
            blks(ch).filter(b=>b.s===slotI).forEach(b=>{
              // idx = position parmi tous les blocs qui couvrent ce slot
              const slotIdx=allAtSlot.indexOf(b);
              const tag=mkTag(b.w,b.id,ch,b.id,wCol(b.w),wType(b.w),false,b.sp,di);
              tag.style.left=(left+2)+'px';
              tag.style.top=(top+TAG_GAP+slotIdx*(TAG_H+TAG_GAP))+'px';
              tag.style.width=(b.sp*CW-6)+'px';
              tag.style.height=TAG_H+'px';
              ov.appendChild(tag);
            });
          }
        }
      }
    }
    G.chantiers.forEach(ch=>placeCh(ch,false,''));
    [['_cfa','cfa'],['_cp','cp'],['_abs','abs']].forEach(([ch,t])=>placeCh(ch,true,t));
  });
}

// ═══════════════════════════════════════════════════════
// CRÉER UN TAG
// ═══════════════════════════════════════════════════════
function mkTag(workerName,blockId,ch,absId,colorCls,wtype,isAbs,span,day){
  const tag=document.createElement('div');
  tag.className=`tag ${colorCls}${wtype==='s'?' st':wtype==='tmp'?' tmp':''}`;
  tag.dataset.bid=blockId;tag.dataset.ch=ch;tag.dataset.day=day;

  const badge=wtype==='s'?'S/T':wtype==='tmp'?'INT':'';
  tag.innerHTML=`<div class="tag-body">
    ${badge?`<span class="tag-badge">${badge}</span>`:''}
    <span class="tag-nm">${workerName}</span>
    <span class="tag-x">✕</span>
  </div>${isAbs?'':`<div class="tag-rz"></div>`}`;

  // Supprimer
  tag.querySelector('.tag-x').addEventListener('click',e=>{
    e.stopPropagation();e.preventDefault();
    if(isAbs){
      const d=parseInt(tag.dataset.day);
      if(d<0){rmBlk(ch,absId);render();return;}
      const iso=isoDate(wkDates(G.off)[d]);
      const a=G.absences.find(x=>x.id===absId);
      if(a){
        if(a.deb===iso&&a.fin===iso)G.absences=G.absences.filter(x=>x.id!==absId);
        else if(a.deb===iso)a.deb=nxtDay(iso);
        else if(a.fin===iso)a.fin=prvDay(iso);
        else{const f1=prvDay(iso);G.absences.push({id:'a'+Date.now(),n:a.n,type:a.type,deb:nxtDay(iso),fin:a.fin});a.fin=f1;}
        save();
      }
    }else{rmBlk(ch,blockId);}
    render();
  });

  if(!isAbs){setupTagDrag(tag,ch,blockId);setupTagResize(tag,ch,blockId);}
  return tag;
}
function nxtDay(iso){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+1);return isoDate(d);}
function prvDay(iso){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()-1);return isoDate(d);}

// DRAG TAG (déplacer)
// ═══════════════════════════════════════════════════════
function setupTagDrag(el,ch,bid){
  let sx,oLeft,active=false;
  function start(cx){
    active=true;sx=cx;oLeft=parseFloat(el.style.left)||0;
    document.body.style.cursor='grabbing';document.body.style.userSelect='none';
  }
  function move(cx){
    if(!active)return;
    rCW();
    const b=blks(ch).find(x=>x.id===bid);if(!b)return;
    const ds=Math.round((cx-sx)/CW);
    const ns=Math.max(0,Math.min(SLOTS-b.sp,b.s+ds));
    el.style.left=(oLeft+(ns-b.s)*CW)+'px';
  }
  function end(cx){
    if(!active)return;active=false;
    document.body.style.cursor='';document.body.style.userSelect='';
    rCW();
    const b=blks(ch).find(x=>x.id===bid);if(!b){render();return;}
    const ds=Math.round((cx-sx)/CW);
    const ns=Math.max(0,Math.min(SLOTS-b.sp,b.s+ds));
    if(ns!==b.s){updBlk(ch,bid,ns,b.sp);render();}
    else placeAllTags();
  }
  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.tag-x,.tag-rz'))return;
    e.preventDefault();e.stopPropagation();start(e.clientX);
    const mm=ev=>move(ev.clientX);
    const mu=ev=>{end(ev.clientX);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.tag-x,.tag-rz'))return;
    if(e.touches.length!==1)return;e.preventDefault();e.stopPropagation();start(e.touches[0].clientX);
    const tm=ev=>{ev.preventDefault();move(ev.touches[0].clientX);};
    const tu=ev=>{end(ev.changedTouches[0].clientX);el.removeEventListener('touchmove',tm);el.removeEventListener('touchend',tu);};
    el.addEventListener('touchmove',tm,{passive:false});el.addEventListener('touchend',tu);
  },{passive:false});
}

// ═══════════════════════════════════════════════════════
// RESIZE TAG
// ═══════════════════════════════════════════════════════
function setupTagResize(el,ch,bid){
  const rz=el.querySelector('.tag-rz');if(!rz)return;
  let sx,oSp,cw,active=false;
  function start(cx){
    rCW();cw=CW; // valeur CSS au moment du clic
    const b=blks(ch).find(x=>x.id===bid);if(!b)return;
    active=true;sx=cx;oSp=b.sp;
    el.classList.add('rzing');
    document.body.style.cursor='ew-resize';document.body.style.userSelect='none';
  }
  function move(cx){
    if(!active)return;
    const dx=cx-sx;
    // Delta en slots (flottant pour fluidité)
    const raw=oSp+dx/cw;
    const ns=Math.max(1,Math.min(SLOTS,Math.round(raw)));
    el.style.width=(ns*cw-6)+'px';
  }
  function end(cx){
    if(!active)return;active=false;
    el.classList.remove('rzing');
    document.body.style.cursor='';document.body.style.userSelect='';
    rCW();
    const b=blks(ch).find(x=>x.id===bid);
    if(b){
      const ns=Math.max(1,Math.min(SLOTS-b.s,Math.round(oSp+(cx-sx)/cw)));
      if(ns!==oSp){updBlk(ch,bid,b.s,ns);render();return;}
    }
    placeAllTags();
  }
  rz.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();start(e.clientX);
    const mm=ev=>move(ev.clientX);
    const mu=ev=>{end(ev.clientX);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  rz.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;e.preventDefault();e.stopPropagation();start(e.touches[0].clientX);
    const tm=ev=>{ev.preventDefault();move(ev.touches[0].clientX);};
    const tu=ev=>{end(ev.changedTouches[0].clientX);rz.removeEventListener('touchmove',tm);rz.removeEventListener('touchend',tu);};
    rz.addEventListener('touchmove',tm,{passive:false});rz.addEventListener('touchend',tu);
  },{passive:false});
}

// COMMANDES
// ═══════════════════════════════════════════════════════
function cmdSt(cmd){
  if(cmd.st==='active'||cmd.st==='done')return cmd.st;
  if(!cmd.deb)return'fut';
  const today=new Date();today.setHours(0,0,0,0);
  const s=new Date(cmd.deb+'T12:00:00'),diff=Math.round((s-today)/86400000);
  const dd=wkDates(0),ws=new Date(dd[0]);ws.setHours(0,0,0,0);const we=new Date(dd[6]);we.setHours(23,59,59,999);
  if(s>=ws&&s<=we)return'this';if(diff<0)return'late';if(diff<=14)return'soon';return'fut';
}
const CL={this:'🟢 Cette sem.',late:'🔴 En retard',soon:'🟡 Dans 2 sem.',fut:'🔵 À venir',active:'✅ Actif',done:'☑ Terminé'};
function renderCmds(){
  const l=document.getElementById('listCmd');l.innerHTML='';
  const ord=['late','this','soon','fut','active','done'];
  const s=[...G.commandes].sort((a,b)=>ord.indexOf(cmdSt(a))-ord.indexOf(cmdSt(b)));
  if(!s.length){l.innerHTML='<div style="padding:12px;text-align:center;font-size:11px;color:var(--dim)">Aucune commande.</div>';return;}
  s.forEach(cmd=>{
    const st=cmdSt(cmd);
    const durStr=cmd.durN&&cmd.durU?`${cmd.durN} ${{dj:'demi-j.',j:'j.',sem:'sem.',mois:'mois'}[cmd.durU]||''}`.trim():'';
    const ds=cmd.deb?new Date(cmd.deb+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):'?';
    const c=document.createElement('div');
    c.className='ccard'+({'this':' ct',late:' cl',soon:' cs'}[st]||'');
    c.innerHTML=`<div style="font-size:11px;font-weight:700">${cmd.nom}</div>
      <div style="font-size:10px;color:var(--dim)">📅 ${ds}${durStr?' · ⏱ '+durStr:''}</div>
      <span class="cbdg ${st}">${CL[st]||st}</span>
      ${cmd.con?`<div style="font-size:10px;color:var(--dim)">📞 ${cmd.con}</div>`:''}
      ${cmd.not?`<div style="font-size:10px;color:var(--dim);font-style:italic">${cmd.not}</div>`:''}
      <div class="cbtns">
        ${st!=='active'&&st!=='done'?`<button class="cbtn act" data-id="${cmd.id}" data-a="act">➕</button>`:''}
        ${st==='active'?`<button class="cbtn" data-id="${cmd.id}" data-a="done">☑</button>`:''}
        <button class="cbtn" data-id="${cmd.id}" data-a="ed">✏</button>
        <button class="cbtn del" data-id="${cmd.id}" data-a="del">🗑</button>
      </div>`;
    c.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();handleCmd(cmd.id,b.dataset.a);}));
    l.appendChild(c);
  });
  const u=s.filter(c=>['late','this'].includes(cmdSt(c))).length;
  document.getElementById('tCmd').textContent=u?`📋 Cmd(${u})`:'📋 Cmd';
}
function handleCmd(id,a){
  const i=G.commandes.findIndex(c=>c.id===id);if(i<0)return;
  const cmd=G.commandes[i];
  if(a==='act'){if(!G.chantiers.includes(cmd.nom))G.chantiers.push(cmd.nom);cmd.st='active';save();render();toast(`"${cmd.nom}" activé`,'ok');stab('C');}
  else if(a==='done'){cmd.st='done';save();renderCmds();toast('Terminé','ok');}
  else if(a==='del'){if(confirm(`Supprimer "${cmd.nom}" ?`)){G.commandes.splice(i,1);save();renderCmds();}}
  else if(a==='ed')openCmdModal(cmd);
}
function actCmd(id){handleCmd(id,'act');}

  document.getElementById('mGenT').textContent=ex?'Modifier':'Nouvelle commande';
  document.getElementById('mGenSimple').style.display='none';
  document.getElementById('mGenCmd').style.display='block';

  document.getElementById('mGenBox').dataset.mode='cmd';
  document.getElementById('mGenBox').dataset.exId=ex?ex.id:'';
  document.getElementById('cNom').value=ex?ex.nom:'';
  document.getElementById('cDeb').value=ex?ex.deb:'';
  document.getElementById('cDurN').value=ex?ex.durN:'';
  document.getElementById('cDurU').value=ex&&ex.durU?ex.durU:'sem';
  document.getElementById('cCon').value=ex?ex.con:'';
  document.getElementById('cNot').value=ex?ex.not:'';
  document.getElementById('mGen').classList.remove('off');
  setTimeout(()=>document.getElementById('cNom').focus(),50);
}

  const nom=document.getElementById('chNom').value.trim();
  if(!nom){toast('Nom requis','err');return;}
  if(G.chantiers.includes(nom)){toast('Chantier déjà existant','err');return;}
  pushHist();
  G.chantiers.push(nom);
  // Si durée fournie, ajouter en commande active
  const durN=document.getElementById('chDurN').value;
  const durU=document.getElementById('chDurU').value;
  const fin=document.getElementById('chFin').value;
  if(durN||fin){
    G.commandes.push({id:'c'+Date.now(),nom,deb:'',fin,durN,durU,con:'',not:'',st:'active'});
  }
  save();render();
  document.getElementById('mCh').classList.add('off');
  toast(`"${nom}" ajouté`,'ok');
});

document.getElementById('mCh').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.add('off');});

let _sOk=null;
function openSimple(title,ph,ok){
  document.getElementById('mGenT').textContent=title;
  document.getElementById('mGenSimple').style.display='block';
  document.getElementById('mGenCmd').style.display='none';
  document.getElementById('mGenOk').textContent='Ajouter';
  document.getElementById('mGenBox').dataset.mode='simple';
  const inp=document.getElementById('mGenIn');inp.placeholder=ph;inp.value='';
  _sOk=ok;document.getElementById('mGen').classList.remove('off');
  setTimeout(()=>inp.focus(),50);
}
document.getElementById('mGenOk').addEventListener('click',()=>{
  const mode=document.getElementById('mGenBox').dataset.mode;
  if(mode==='simple'){
    const v=document.getElementById('mGenIn').value.trim();
    if(_sOk)_sOk(v);
    document.getElementById('mGen').classList.add('off');
  }else{
    const nom=document.getElementById('cNom').value.trim();if(!nom)return;
    const exId=document.getElementById('mGenBox').dataset.exId;
    const data={id:exId||'c'+Date.now(),nom,
      deb:document.getElementById('cDeb').value,
      durN:document.getElementById('cDurN').value,
      durU:document.getElementById('cDurU').value,
      con:document.getElementById('cCon').value.trim(),
      not:document.getElementById('cNot').value.trim(),
      st:exId?G.commandes.find(c=>c.id===exId)?.st||'pipeline':'pipeline'};
    if(exId){const i=G.commandes.findIndex(c=>c.id===exId);if(i>=0)G.commandes[i]=data;}
    else G.commandes.push(data);
    save();renderCmds();toast(exId?'Mis à jour':`"${nom}" ajouté`,'ok');
    document.getElementById('mGen').classList.add('off');
  }
});
document.getElementById('mGenNo').addEventListener('click',()=>document.getElementById('mGen').classList.add('off'));
document.getElementById('mGen').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.add('off');});

}

function applyLogo(){
  const img=document.getElementById('logoImg'),txt=document.getElementById('logoTxt');
  const src=(G.cfg&&G.cfg.logo)||DEFAULT_LOGO;
  img.src=src;img.style.display='block';txt.style.display='none';
}
document.getElementById('bAddW').addEventListener('click',()=>{
  const n=document.getElementById('cgWn').value.trim();if(!n)return;
  if(G.workers.find(w=>w.n===n)){toast('Nom existant','err');return;}
  const sal=G.workers.filter(w=>w.t==='w');
  G.workers.push({id:'w'+Date.now(),n,col:WCOLS[sal.length%WCOLS.length],t:'w'});
  document.getElementById('cgWn').value='';save();render();toast(`${n} ajouté`,'ok');
});
document.getElementById('bAddST').addEventListener('click',()=>{
  const n=document.getElementById('cgSTn').value.trim();if(!n)return;
  if(G.workers.find(w=>w.n===n)){toast('Nom existant','err');return;}
  const sts=G.workers.filter(w=>w.t==='s');
  G.workers.push({id:'w'+Date.now(),n,col:STCOLS[sts.length%STCOLS.length],t:'s'});
  document.getElementById('cgSTn').value='';save();render();toast(`${n} ajouté`,'ok');
});
document.getElementById('bAddTmp').addEventListener('click',()=>{
  const n=document.getElementById('cgTn').value.trim();
  const deb=document.getElementById('cgTdeb').value;
  const fin=document.getElementById('cgTfin').value;
  if(!n||!deb||!fin){toast('Nom, début et fin requis','err');return;}
  if(G.workers.find(w=>w.n===n)){toast('Nom existant','err');return;}
  const tmps=G.workers.filter(w=>w.t==='tmp');
  G.workers.push({id:'w'+Date.now(),n,col:TCOLS[tmps.length%TCOLS.length],t:'tmp',deb,fin});
  document.getElementById('cgTn').value='';document.getElementById('cgTdeb').value='';document.getElementById('cgTfin').value='';
  save();render();toast(`${n} ajouté (intér./stag.)`,'ok');
});
document.getElementById('bDelW').addEventListener('click',()=>{
  const n=document.getElementById('cgDelW').value;if(!n||!confirm(`Supprimer "${n}" ?`))return;
  G.workers=G.workers.filter(w=>w.n!==n);save();render();toast(`${n} supprimé`,'ok');
});
document.getElementById('bSync').addEventListener('click',()=>{
  if(typeof window._fbPush==='function'){
    window._fbPush(JSON.parse(JSON.stringify(G)));
    toast('Planning synchronisé ✓','ok');
  } else {
    toast('Firebase non connecté','err');
  }
});
document.getElementById('bExp').addEventListener('click',()=>{
  const dd=wkDates(G.off),wn=isoW(dd[0]);
  let csv=`Planning Sem. ${wn} ${dd[0].getFullYear()}\nChantier;Ouvrier;`+
    JOURS.flatMap((j,i)=>[`${j} ${fD(dd[i])} M`,`${j} ${fD(dd[i])} AM`]).join(';')+'\n';
  G.chantiers.forEach(c=>{
    const ws=new Set(blks(c).map(b=>b.w));
    ws.forEach(w=>{const row=Array(14).fill('');
      blks(c).filter(b=>b.w===w).forEach(b=>{for(let i=0;i<b.sp;i++)if(b.s+i<14)row[b.s+i]=w;});
      csv+=`"${c}";"${w}";${row.join(';')}\n`;});
  });
  const u=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const a=document.createElement('a');a.href=u;a.download=`planning_S${wn}_${dd[0].getFullYear()}.csv`;a.click();URL.revokeObjectURL(u);
  toast('Export CSV téléchargé','ok');
});
document.getElementById('bPrint').addEventListener('click',()=>{
  const injected=[];

  function injectForPrint(ch){
    blks(ch).forEach(b=>{
      const w=G.workers.find(x=>x.n===b.w)||{col:'c0'};
      const bg=getCSSColor(w.col);
      // Injecter dans CHAQUE cellule couverte par le span (b.s à b.s+b.sp-1)
      for(let slot=b.s;slot<b.s+b.sp;slot++){
        const cell=document.querySelector(
          `.ptable td[data-ch="${CSS.escape(ch)}"][data-s="${slot}"]`);
        if(!cell)continue;
        const div=document.createElement('div');
        div.className='tag-print-clone';
        div.style.setProperty('--c',bg);
        // Premier slot : affiche le nom + indique si continue
        // Autres slots : indicateur de continuation
        div.textContent=slot===b.s ? b.w : '↩ '+b.w;
        cell.appendChild(div);
        injected.push(div);
      }
    });
  }

  // Injecter pour chantiers actifs + lignes spéciales
  G.chantiers.filter(ch=>!isChHiddenThisWeek(ch)).forEach(injectForPrint);
  ['_cfa','_cp','_abs'].forEach(injectForPrint);

  window.print();
  injected.forEach(el=>el.remove());
});
document.addEventListener('click',e=>{
  const p=document.getElementById('cfgpan'),b=document.getElementById('bCfg');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!b.contains(e.target))p.classList.remove('on');
});

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
// ── Historique pour annulation
const _hist=[];
const _HIST_MAX=20;
function pushHist(){
  _hist.push(JSON.stringify({planning:G.planning,visits:G.visits,absences:G.absences,chantiers:G.chantiers}));
  if(_hist.length>_HIST_MAX)_hist.shift();
}
function undo(){
  if(!_hist.length){toast('Rien à annuler','err');return;}
  const snap=JSON.parse(_hist.pop());
  G.planning=snap.planning;G.visits=snap.visits;G.absences=snap.absences;G.chantiers=snap.chantiers;
  save();render();toast('Annulation ✓','ok');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

let _tt;
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+type;clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),3000);}

// Migration anciens formats
if(G.workers[0]&&G.workers[0].name){
  G.workers=G.workers.map((w,i)=>({id:'w'+i,n:w.name||w.n||'',col:w.color||w.col||'c0',
    t:w.type==='st'?'s':w.t||'w',deb:w.deb,fin:w.fin}));

if(G.commandes[0]&&!G.commandes[0].durN&&G.commandes[0].dur){

    const m=(c.dur||'').match(/(\d+)/);
    return{...c,durN:m?m[1]:'',durU:'sem',deb:c.deb||c.dateDebut||'',
      con:c.con||c.contact||'',not:c.not||c.notes||'',
      st:c.st||(c.statut==='active'?'active':c.statut==='terminee'?'done':'pipeline')};

rCW();
render();
